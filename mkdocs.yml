site_name: 我的个人博客
site_description: 记录生活与技术
site_author: dynapx
site_url: https://dynapx.github.io/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs # 顶部导航分组
    - navigation.top # 返回顶部按钮
    - navigation.instant # 单页应用(SPA)体验，页面切换无刷新
    - navigation.instant.progress # 顶部加载进度条
    - navigation.tracking # 自动更新URL片段
    - search.suggest # 搜索建议
    - search.highlight # 搜索高亮
    - header.autohide # 滚动时自动隐藏头部
    - content.code.copy # 代码块添加一键复制按钮
    - content.code.annotate # 代码块注解
    - content.tabs.link # 记忆选项卡选择
    - navigation.footer # 开启底部的 下一页/上一页 跳转按钮，方便连续阅读
  palette:
    # 默认白天模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到暗色模式
    # 默认夜间模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到白天模式

plugins:
  - search
  - macros # 启用统计宏脚本
  - blog:
      blog_dir: blog

markdown_extensions:
  - attr_list # 支持为视图组件添加属性
  - md_in_html # 支持 HTML 中嵌套解析 Markdown
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed: # 支持选项卡
      alternate_style: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

nav:
  - 🏠 首页: index.md
  - 📝 博文: blog/index.md
  - 📚 连载博文:
    - 🟢 CUDA 编程指南:
      - series/cuda/part1.md
      - series/cuda/part2.md
  - 🌿 日常随笔:
    - essays/index.md
    - essays/2026-04-17-hiking.md
    - essays/weekend-coffee-reading.md
